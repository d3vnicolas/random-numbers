<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Números Aleatórios</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="font-sora bg-bg-primary bg-shape h-screen bg-cover bg-center px-4">
    <header class="mx-auto mb-24 w-full max-w-7xl pt-16">
      <img class="w-full max-w-43" src="./public/images/logo.png" alt="Logo Numbers" />
    </header>
    <main>
      <section>
        <div class="container mx-auto max-w-7xl">
          <p
            class="from-content-secondary to-bg-gray font-roboto mb-4 bg-linear-to-r bg-clip-text text-base font-bold text-transparent uppercase"
          >
            Online - gratuito
          </p>
          <h1 class="font-sora text-7xl leading-[130%] font-extrabold tracking-[-4%] uppercase">
            Sorteador <br />
            de números
          </h1>
          <div class="flex">
            <ul>
              <li class="flex">
                <img
                  src="./public/images/icons/icon-chat.svg"
                  alt="Ícone de mensagem"
                  class="mr-2 inline h-6 w-6"
                />
                <div class="mb-4 flex flex-col">
                  <h4 class="text-bg-brand font-roboto font-medium/[150%] text-sm">
                    Como funciona o sorteador de números?
                  </h4>
                  <p>
                    O sorteador utiliza um algoritmo de geração aleatória para criar <br />
                    números dentro do intervalo especificado pelo usuário.
                  </p>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
